<!DOCTYPE html>
<html>
<head>
<title>JSON to Excel — TextMint</title>
<meta name="description" content="Convert JSON to Excel CSV format instantly.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:system-ui;background:#f7f7f8;margin:0;padding:20px}
.container{max-width:920px;margin:auto}
.top a{text-decoration:none;color:#666;font-size:14px}
.desc{color:#666;margin-bottom:18px}
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,0.05);margin-bottom:16px}
textarea{width:100%;height:170px;padding:12px;border-radius:8px;border:1px solid #e5e5e5;font-family:monospace}
button{background:#111;color:white;border:none;padding:9px 14px;border-radius:6px;margin-right:6px}
.secondary{background:#eee;color:#222}
.footer-note{font-size:13px;color:#888;margin-top:8px}
</style>
</head>

<body>
<div class="container">

<div class="top"><a href="/">← Back to tools</a></div>
<h1>JSON to Excel</h1>
<p class="desc">Convert JSON array into spreadsheet CSV format.</p>

<div class="card">
<textarea id="input"></textarea>
<br><br>
<button onclick="process()">Convert</button>
<button class="secondary" onclick="clearInput()">Clear</button>
</div>

<div class="card">
<textarea id="output"></textarea>
<br><br>
<button onclick="copyOutput()">Copy</button>
<p class="footer-note">Runs locally in your browser. No data uploaded.</p>
</div>

</div>

<script>
function process(){
try{
let json=JSON.parse(document.getElementById("input").value);
let headers=Object.keys(json[0]);
let csv=headers.join(",")+"\n";
json.forEach(row=>{
csv+=headers.map(h=>row[h] ?? "").join(",")+"\n";
});
document.getElementById("output").value=csv;
}catch(e){
alert("Invalid JSON");
}
}
function copyOutput(){
let output=document.getElementById("output");
output.select();
document.execCommand("copy");
}
function clearInput(){
document.getElementById("input").value="";
document.getElementById("output").value="";
}
</script>
</body>
</html>
