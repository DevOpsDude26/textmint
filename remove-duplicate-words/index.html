<!DOCTYPE html>
<html>
<head>
<title>Remove Duplicate Words — TextMint</title>
<meta name="description" content="Remove duplicate words instantly.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* same CSS */
</style>
</head>
<body>
<div class="container">

<a href="/">← Back</a>
<h1>Remove Duplicate Words</h1>
<p>Delete repeated words.</p>

<div class="card">
<div class="label">Input</div>
<textarea id="input"></textarea>
<br><br>
<button onclick="sample()">Try Sample</button>
<button onclick="process()">Remove</button>
<button class="secondary" onclick="clearInput()">Clear</button>
</div>

<div class="card">
<div class="label">Output</div>
<textarea id="output"></textarea>
<br><br>
<button onclick="copyOutput()">Copy</button>
<p class="footer-note">Runs locally in your browser.</p>
</div>

<div class="card">
<div class="label">Related tools</div>
<a href="/remove-duplicates">Remove Duplicate Lines</a>
<a href="/trim-whitespace">Trim Whitespace</a>
</div>

<div class="card">
<h2>FAQ</h2>
<p>Removes repeated words.</p>
</div>

</div>

<script>
function process(){
let words=document.getElementById("input").value.split(/\s+/);
document.getElementById("output").value=[...new Set(words)].join(" ");
}
function sample(){document.getElementById("input").value="apple banana apple mango"}
function copyOutput(){let o=document.getElementById("output");o.select();document.execCommand("copy")}
function clearInput(){document.getElementById("input").value="";document.getElementById("output").value=""}
</script>
</body>
</html>
