<!DOCTYPE html>
<html>
<head>
<title>Remove Duplicate Lines — TextMint</title>
<meta name="description" content="Remove duplicate lines from text instantly. Runs in your browser with no upload.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
background:#f7f7f8;
margin:0;
padding:20px;
color:#222;
}

.container{
max-width:920px;
margin:auto;
}

.top{
margin-bottom:12px;
}

.top a{
text-decoration:none;
color:#666;
font-size:14px;
}

h1{
margin-bottom:4px;
}

.desc{
color:#666;
margin-bottom:18px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
margin-bottom:16px;
}

textarea{
width:100%;
height:170px;
padding:12px;
border-radius:8px;
border:1px solid #e5e5e5;
font-family:monospace;
resize:vertical;
}

.actions{
margin-top:10px;
}

button{
background:#111;
color:white;
border:none;
padding:9px 14px;
border-radius:6px;
cursor:pointer;
margin-right:6px;
}

.secondary{
background:#eee;
color:#222;
}

.footer-note{
font-size:13px;
color:#888;
margin-top:8px;
}
</style>

</head>

<body>

<div class="container">

<div class="top">
<a href="/">← Back to tools</a>
</div>

<h1>Remove Duplicate Lines</h1>
<p class="desc">Remove repeated lines from text instantly.</p>

<div class="card">
<textarea id="input" placeholder="Paste text here..."></textarea>

<div class="actions">
<button onclick="sample()">Try Sample</button>
<button onclick="process()">Remove Duplicates</button>
<button class="secondary" onclick="clearInput()">Clear</button>
</div>

<div class="card">
<textarea id="output" placeholder="Output..."></textarea>

<div class="actions">
<button onclick="copyOutput()">Copy</button>
</div>

<p class="footer-note">Runs locally in your browser. No data uploaded.</p>

</div>

</div>

<script>
function process(){
let text=document.getElementById("input").value;
let lines=text.split("\n");
let unique=[...new Set(lines)];
document.getElementById("output").value=unique.join("\n");
}

function copyOutput(){
let output=document.getElementById("output");
output.select();
document.execCommand("copy");
}

function clearInput(){
document.getElementById("input").value="";
document.getElementById("output").value="";
}

function sample(){
document.getElementById("input").value=
`apple
banana
apple
orange
banana`;
}
</script>

</body>
</html>
