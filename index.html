<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;

}
.container{max-width:900px;margin:auto}
h1{text-align:center;margin-bottom:5px}
.subtitle{text-align:center;color:#666;margin-bottom:30px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}

.card{
background:white;border:1px solid #e5e5e5;
padding:22px;border-radius:10px;
text-decoration:none;color:inherit;

}

.card:hover{border-color:#111}

.primary{grid-column:span 2;border:2px solid #111}

@media (max-width:600px){
.grid{grid-template-columns:1fr}
.primary{grid-column:span 1}
}
</style>
</head>

<body>
<div class="container">

<h1>TextMint</h1>
<p class="subtitle">Simple and fast text utilities</p>

<div class="grid">

<a class="card primary" href="remove-duplicates.html">
<h3>Remove Duplicate Lines</h3>
<p>Remove repeated lines instantly</p>
</a>

<a class="card" href="json-to-excel.html">
<h3>JSON to Excel</h3>
<p>Convert JSON to spreadsheet</p>
</a>

<a class="card" href="sort-lines.html">
<h3>Sort Lines</h3>
<p>Sort text alphabetically</p>
</a>

</div>
</div>
</body>
</html>
