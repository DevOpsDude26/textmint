<!DOCTYPE html>
<html>
<head>
<title>Remove Duplicate Lines - TextMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:system-ui;background:#fafafa;margin:0;padding:20px}
.container{max-width:900px;margin:auto}
textarea{width:100%;height:150px;padding:12px;margin-top:10px;border:1px solid #ddd;border-radius:8px}
button{background:#111;color:white;border:none;padding:10px 15px;margin-top:10px;border-radius:6px;cursor:pointer}
.card{background:white;padding:20px;border-radius:10px;border:1px solid #e5e5e5;margin-top:20px}
a{text-decoration:none;color:#111}
</style>
</head>

<body>
<div class="container">

<a href="index.html">← Home</a>
<h1>Remove Duplicate Lines</h1>

<div class="card">
<textarea id="input" placeholder="Paste text here..."></textarea>
<br>
<button onclick="removeDuplicates()">Remove Duplicates</button>
</div>

<div class="card">
<h3>Output</h3>
<textarea id="output"></textarea>
</div>

</div>

<script>
function removeDuplicates(){
let text=document.getElementById("input").value;
let lines=text.split("\n");
let unique=[...new Set(lines)];
document.getElementById("output").value=unique.join("\n");
}
</script>

</body>
</html>
