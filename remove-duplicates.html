<script>
function removeDuplicates() {
    let text = document.getElementById("input").value;
    
    let caseInsensitive = document.getElementById("caseInsensitive").checked;
    let trim = document.getElementById("trim").checked;
    let removeEmpty = document.getElementById("removeEmpty").checked;

    let lines = text.split("\n");
    let seen = new Set();
    let result = [];

    for (let line of lines) {
        let processed = line;

        if (trim) processed = processed.trim();
        if (caseInsensitive) processed = processed.toLowerCase();

        if (removeEmpty && processed === "") continue;

        if (!seen.has(processed)) {
            seen.add(processed);
            result.push(line);
        }
    }

    document.getElementById("output").value = result.join("\n");
}

function copyOutput(){
    let output = document.getElementById("output");
    output.select();
    document.execCommand("copy");
}
</script>
