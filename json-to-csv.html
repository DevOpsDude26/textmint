<!DOCTYPE html>
<html>
<head>
<title>JSON to Excel - TextMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:system-ui;background:#fafafa;margin:0;padding:20px}
.container{max-width:900px;margin:auto}
textarea{width:100%;height:150px;padding:12px;margin-top:10px;border:1px solid #ddd;border-radius:8px}
button{background:#111;color:white;border:none;padding:10px 15px;margin-top:10px;border-radius:6px;cursor:pointer}
.card{background:white;padding:20px;border-radius:10px;border:1px solid #e5e5e5;margin-top:20px}
a{text-decoration:none;color:#111}
</style>
</head>

<body>
<div class="container">

<a href="index.html">← Home</a>
<h1>JSON to Excel</h1>

<div class="card">
<textarea id="input" placeholder='[{"name":"John","age":25}]'></textarea>
<br>
<button onclick="convert()">Convert</button>
</div>

<div class="card">
<h3>Output (CSV)</h3>
<textarea id="output"></textarea>
</div>

</div>

<script>
function convert(){
try{
let json=JSON.parse(document.getElementById("input").value);
let headers=Object.keys(json[0]);
let csv=headers.join(",")+"\n";

json.forEach(row=>{
csv+=headers.map(h=>row[h]).join(",")+"\n";
});

document.getElementById("output").value=csv;
}catch(e){
alert("Invalid JSON");
}
}
</script>

</body>
</html>
