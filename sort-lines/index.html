<!DOCTYPE html>
<html>
<head>
<title>Remove Duplicate Words - TextMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:system-ui;background:#fafafa;margin:0;padding:20px}
.container{max-width:900px;margin:auto}
textarea{width:100%;height:160px;padding:12px;border:1px solid #ddd;border-radius:8px}
button{background:#111;color:white;border:none;padding:10px 15px;margin-top:10px;border-radius:6px}
.card{background:white;padding:20px;border-radius:10px;border:1px solid #e5e5e5;margin-top:20px}
</style>
</head>

<body>
<div class="container">

<a href="/">← Home</a>
<h1>Remove Duplicate Words</h1>

<div class="card">
<textarea id="input" placeholder="Paste text here..."></textarea>
<br>
<button onclick="process()">Remove Duplicate Words</button>
</div>

<div class="card">
<textarea id="output"></textarea>
</div>

</div>

<script>
function process(){
let text=document.getElementById("input").value;
let words=text.split(/\s+/);
let unique=[...new Set(words)];
document.getElementById("output").value=unique.join(" ");
}
</script>

</body>
</html>
