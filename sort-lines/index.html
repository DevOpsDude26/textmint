<!DOCTYPE html>
<html>
<head>
<title>Sort Lines - TextMint</title>
<meta name="description" content="Sort lines of text alphabetically online for free.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:system-ui;background:#fafafa;margin:0;padding:20px}
.container{max-width:900px;margin:auto}
textarea{width:100%;height:160px;padding:12px;margin-top:10px;border:1px solid #ddd;border-radius:8px}
button{background:#111;color:white;border:none;padding:10px 15px;margin-top:10px;border-radius:6px;cursor:pointer;margin-right:6px}
.secondary{background:#eee;color:#222}
.card{background:white;padding:20px;border-radius:10px;border:1px solid #e5e5e5;margin-top:20px}
a{text-decoration:none;color:#111}
</style>
</head>

<body>
<div class="container">

<a href="/">← Home</a>
<h1>Sort Lines</h1>

<div class="card">
<textarea id="input" placeholder="Paste lines here..."></textarea>
<br>
<button onclick="sortLines()">Sort</button>
<button class="secondary" onclick="clearInput()">Clear</button>
</div>

<div class="card">
<h3>Output</h3>
<textarea id="output"></textarea>
<br>
<button onclick="copyOutput()">Copy</button>
</div>

</div>

<script>
function sortLines(){
let text=document.getElementById("input").value;
let lines=text.split("\n");
lines.sort();
document.getElementById("output").value=lines.join("\n");
}

function copyOutput(){
let output=document.getElementById("output");
output.select();
document.execCommand("copy");
}

function clearInput(){
document.getElementById("input").value="";
document.getElementById("output").value="";
}
</script>

</body>
</html>
